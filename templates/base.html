<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Computer Vision Dehazer{% endblock %}</title>

    <!-- Google Fonts: Inter for academic/professional feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/a48832a9b2.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-color: #3b82f6; /* Modern solid blue */
            --primary-hover: #2563eb;
            --accent-color: #6366f1; /* Indigo accent */
            --bg-color: #0f172a; /* Slate 900 */
            --bg-secondary: #1e293b; /* Slate 800 */
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            padding-top: 90px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sleek Navbar */
        .navbar-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 3rem;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-color);
            letter-spacing: -0.5px;
        }

        .nav-brand i {
            color: var(--primary-color);
            margin-right: 0.75rem;
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-color);
        }

        .menu-toggle {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-color);
        }

        /* Mobile Nav */
        @media (max-width: 768px) {
            .navbar-custom { padding: 1rem; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: var(--bg-secondary);
                padding: 1rem 0;
                text-align: center;
                border-bottom: 1px solid var(--glass-border);
            }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Professional Panels */
        .glass-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        /* Clean Primary Button */
        .btn-primary {
            display: inline-block;
            background: var(--primary-color);
            color: #ffffff;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3);
            color: #ffffff;
        }
        
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem 2rem;
            box-sizing: border-box;
        }

        h1, h2, h3, h4, h5 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-color);
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(15, 23, 42, 0.8);
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <a class="nav-brand" href="{{ url_for('home') }}">
            <i class="fa-solid fa-layer-group"></i>
            CV Dehazer
        </a>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">Methodology</a></li>
            <li><a href="{{ url_for('image_dehazer_route') }}">Image Processing</a></li>
            <li><a href="{{ url_for('video_dehazer_route') }}">Video Processing</a></li>
            <li><a href="{{ url_for('realtime_dehazer') }}">Live Stream</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p><strong>Final Year Project</strong> &bull; Developed by Sukesh Reddy</p>
        <p style="opacity: 0.7; margin-top: 5px;">Computer Vision / Digital Image Processing</p>
    </footer>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        if(mobileMenu){
            mobileMenu.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
