{% extends "base.html" %}

{% block title %}Realtime Dehazer - Dehazer App{% endblock %}

{% block content %}
<style>
    .page-container {
        margin-top: 5vh;
        width: 100%;
        max-width: 800px;
        animation: fadeIn 0.8s ease-out;
        text-align: center;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1.title {
        color: #ff4e00;
        margin-bottom: 2rem;
    }

    .file-input-wrapper {
        margin: 2rem 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    .video-container {
        margin-top: 3rem;
        text-align: left;
    }

    .video-container h2 {
        color: var(--primary-glow);
        margin-bottom: 1rem;
    }

    video {
        width: 100%;
        border-radius: 12px;
        border: 2px solid var(--glass-border);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
</style>

<div class="page-container glass-container">
    <h1 class="title">Realtime Dehazer</h1>
    <p>Upload a video stream or connect a real-time feed.</p>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="file-input-wrapper">
            <input type="file" id="file" name="file" class="form-control" style="max-width: 400px;" accept="video/*" required>
        </div>
        <button type="submit" class="btn-glow" style="background: linear-gradient(135deg, #ff4e00, #cc3e00);">Start Stream</button>
    </form>

    {% if original_video %}
    <div class="video-container">
        <h2>Original Stream</h2>
        <video controls>
            <source src="{{ original_video }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    {% endif %}

    {% if dehazed_video %}
    <div class="video-container">
        <h2>Dehazed Stream</h2>
        <video controls style="border-color: #ff4e00;">
            <source src="{{ dehazed_video }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    {% endif %}
</div>
{% endblock %}
