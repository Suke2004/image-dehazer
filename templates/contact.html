{% extends 'base.html' %}
{% block title %}Contact - Dehazer App{% endblock %}
{% block content %}
<style>
    .page-container {
        margin-top: 5vh;
        width: 100%;
        max-width: 600px;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1.title {
        color: #f5b700;
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2.5rem;
    }

    .form-group textarea.form-control {
        resize: vertical;
        min-height: 120px;
    }
    
    .btn-submit {
        background: linear-gradient(135deg, #f5b700, #c49200);
        width: 100%;
        margin-top: 1rem;
        color: #000;
    }
</style>

<div class="page-container glass-container">
    <h1 class="title">Get In Touch</h1>
    
    <form>
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="Enter your first name">
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Enter your last name">
        </div>
        <div class="form-group">
            <label for="inputEmail4">Email</label>
            <input type="email" class="form-control" id="inputEmail4" placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="inputAddress">Message / Address</label>
            <textarea class="form-control" rows="5" id="inputAddress" placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="btn-glow btn-submit">Submit</button>
    </form>
</div>
{% endblock %}
